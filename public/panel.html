<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel VIP</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:
radial-gradient(circle at top,#1a4dff22 0%,transparent 30%),
radial-gradient(circle at bottom,#00c3ff22 0%,transparent 35%),
linear-gradient(135deg,#020b1f,#071b47,#0a2f75,#0b46b0);
background-size:cover;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(120deg,transparent 0%,rgba(255,255,255,.03) 45%,transparent 55%),
linear-gradient(0deg,rgba(255,255,255,.02),rgba(255,255,255,.02));
pointer-events:none;
}

.panel{
background:linear-gradient(180deg,rgba(255,255,255,0.10),rgba(255,255,255,0.04));
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);
padding:34px 28px 26px;
border-radius:28px;
box-shadow:
0 20px 60px rgba(0,0,0,0.45),
0 0 30px rgba(0,174,255,0.25),
inset 0 1px 0 rgba(255,255,255,0.15);
text-align:center;
width:min(92vw,430px);
position:relative;
border:1px solid rgba(255,255,255,0.12);
overflow:hidden;
}

.panel::after{
content:"PANEL";
position:absolute;
top:14px;
left:18px;
font-size:11px;
letter-spacing:3px;
padding:6px 10px;
border-radius:999px;
background:linear-gradient(90deg,#ffd700,#ffb300);
color:#111;
font-weight:900;
box-shadow:0 0 18px rgba(255,215,0,.35);
}

h2{
margin:0 0 20px;
font-size:28px;
text-shadow:0 0 10px rgba(0,170,255,.35);
}

input{
width:88%;
padding:14px 16px;
border-radius:14px;
border:1px solid rgba(255,255,255,.10);
margin:7px 0;
outline:none;
background:rgba(255,255,255,.09);
color:white;
font-size:15px;
box-shadow:inset 0 0 10px rgba(255,255,255,.03);
}

input::placeholder{
color:rgba(255,255,255,.65);
}

button{
padding:13px 22px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#009dff,#00d0ff);
color:white;
cursor:pointer;
font-weight:700;
letter-spacing:.4px;
transition:.25s;
box-shadow:0 10px 25px rgba(0,170,255,.25);
margin-top:10px;
}

button:hover{
transform:translateY(-2px) scale(1.02);
box-shadow:0 12px 28px rgba(0,170,255,.38);
}

#msg{
margin-top:14px;
font-size:14px;
min-height:22px;
color:rgba(255,255,255,.85);
}

.ok{
color:#00ff9d !important;
}

.bad{
color:#ff7272 !important;
}

@media (max-width:480px){
.panel{
padding:28px 18px 20px;
width:94vw;
}
h2{
font-size:24px;
}
}
</style>
</head>
<body>

<div class="panel">
  <h2>Crear usuario</h2>
  <input id="newUser" placeholder="usuario">
  <br>
  <input id="newPass" type="password" placeholder="contraseña">
  <br>
  <button onclick="crearUsuario()">Crear usuario</button>
  <div id="msg"></div>
</div>

<script>
function crearUsuario(){
  const user = document.getElementById("newUser").value.trim()
  const pass = document.getElementById("newPass").value.trim()
  const msg = document.getElementById("msg")

  msg.className = ""
  msg.innerText = ""

  fetch("/create-user", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ user, pass })
  })
  .then(r => r.json())
  .then(d => {
    if(d.ok){
      msg.className = "ok"
      msg.innerText = "Usuario creado correctamente"
      document.getElementById("newUser").value = ""
      document.getElementById("newPass").value = ""
    }else{
      msg.className = "bad"
      msg.innerText = d.error || "No se pudo crear el usuario"
    }
  })
  .catch(() => {
    msg.className = "bad"
    msg.innerText = "Error de conexión con el servidor"
  })
}
</script>

</body>
</html>
